<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUPY 后台数据管理面板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f3;
      --card: rgba(255, 255, 255, 0.86);
      --text: #17221b;
      --muted: #688070;
      --line: #dde6dd;
      --brand: #1f8f63;
      --brand-soft: #e8f6ef;
      --warn: #b45309;
      --danger: #dc2626;
      --shadow: 0 20px 50px rgba(18, 33, 24, 0.08);
      --focus: 0 0 0 4px rgba(31, 143, 99, 0.16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "SF Pro Display", "SF Pro Text", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top right, #edf8f1 0, transparent 30%), var(--bg);
      color: var(--text);
    }
    .shell { max-width: 1400px; margin: 0 auto; padding: 32px; }
    .hero { display:flex; justify-content:space-between; gap:24px; align-items:flex-start; margin-bottom:24px; }
    .hero h1 { margin:0; font-size:40px; line-height:1; }
    .hero p { margin:10px 0 0; color: var(--muted); }
    .card {
      background: var(--card);
      border:1px solid rgba(255,255,255,0.75);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .login-card, .toolbar, .section { padding: 24px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:16px; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .toolbar .actions, .toolbar .filters, .toolbar .keyword-wrap { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    input, button, select {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 14px;
      background:#fff;
      transition: box-shadow .18s ease, border-color .18s ease, transform .18s ease, opacity .18s ease;
    }
    input, select { min-width: 180px; }
    button { cursor: pointer; font-weight: 700; }
    button:disabled { cursor: not-allowed; opacity: .6; transform: none; }
    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: none;
      box-shadow: var(--focus);
      border-color: rgba(31, 143, 99, 0.45);
    }
    .primary { background: var(--brand); color:#fff; border-color: var(--brand); }
    .ghost { background:#fff; color:var(--text); }
    .stats { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap:16px; margin-bottom:20px; }
    .stat { padding:20px; }
    .stat small { color: var(--muted); display:block; margin-bottom:8px; }
    .stat strong { font-size: 32px; }
    .tabs { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
    .tab.active { background: var(--brand); color:#fff; border-color: var(--brand); }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding:14px 12px; border-bottom:1px solid var(--line); vertical-align: top; font-size:14px; }
    th { color: var(--muted); font-size:12px; text-transform: uppercase; letter-spacing: .08em; }
    .pill { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .pill.ok { background:#e8f6ef; color: var(--brand); }
    .pill.pending { background:#fff7ed; color: var(--warn); }
    .stack { display:grid; gap:16px; }
    .muted { color: var(--muted); }
    .hidden { display:none !important; }
    .two-col { display:grid; grid-template-columns: 1.3fr .9fr; gap:20px; }
    .empty-state {
      border: 1px dashed var(--line);
      border-radius: 20px;
      padding: 28px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(248, 250, 252, 0.8);
    }
    .error-state {
      border: 1px dashed rgba(220, 38, 38, 0.22);
      border-radius: 20px;
      padding: 28px 20px;
      text-align: center;
      color: var(--danger);
      background: rgba(254, 242, 242, 0.82);
    }
    .error-state p { margin: 0 0 14px; }
    .pagination {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-top:16px;
      color: var(--muted);
      font-size: 13px;
    }
    .pagination .controls { display:flex; gap:8px; }
    .loading-inline {
      display:flex;
      align-items:center;
      justify-content:center;
      min-height: 120px;
      color: var(--muted);
      font-size: 13px;
    }
    .toast { position:fixed; right:24px; bottom:24px; background:#15231a; color:#fff; padding:14px 18px; border-radius:16px; box-shadow: var(--shadow); opacity:0; transform: translateY(10px); transition:.2s; }
    .toast.show { opacity:1; transform: translateY(0); }
    .visually-hidden {
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }
    @media (max-width: 980px) {
      .shell { padding: 16px; }
      .stats, .two-col { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
      input, select { min-width: 100%; }
      .toolbar { align-items: stretch; }
      .toolbar .actions, .toolbar .filters, .toolbar .keyword-wrap { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div>
        <h1>PUPY 后台数据管理面板</h1>
        <p>独立于 App 的运营与审核入口。可查看应用核心数据，并审核用户资料。</p>
      </div>
      <div class="card login-card" style="min-width:320px;">
        <div style="font-weight:800; margin-bottom:12px;">管理员登录</div>
        <div class="stack">
          <label class="visually-hidden" for="email">管理员邮箱</label>
          <input id="email" placeholder="请输入管理员邮箱" autocomplete="username" />
          <label class="visually-hidden" for="password">登录密码</label>
          <input id="password" type="password" placeholder="请输入登录密码" autocomplete="current-password" />
          <button id="loginBtn" class="primary">登录后台</button>
          <div id="loginStatus" class="muted">登录后可查看平台数据与审核信息。</div>
        </div>
      </div>
    </div>

    <div id="app" class="hidden">
      <div class="card toolbar">
        <div class="filters">
          <button type="button" class="tab active" data-tab="overview">总览</button>
          <button type="button" class="tab" data-tab="users">用户审核</button>
          <button type="button" class="tab" data-tab="pets">宠物资料</button>
          <button type="button" class="tab" data-tab="market">市场数据</button>
          <button type="button" class="tab" data-tab="breeding">繁育请求</button>
        </div>
        <div class="actions">
          <div class="keyword-wrap">
            <label class="visually-hidden" for="keyword">搜索关键词</label>
            <input id="keyword" placeholder="搜索用户名或邮箱" />
          </div>
          <button type="button" id="refreshBtn" class="ghost">刷新数据</button>
          <button type="button" id="logoutBtn" class="ghost">退出</button>
        </div>
      </div>

      <section id="overviewTab" class="tab-panel">
        <div id="stats" class="stats"></div>
        <div class="two-col">
          <div class="card section">
            <div style="font-weight:800; margin-bottom:16px;">最近注册用户</div>
            <div id="recentUsers"></div>
          </div>
          <div class="stack">
            <div class="card section">
              <div style="font-weight:800; margin-bottom:16px;">最近宠物档案</div>
              <div id="recentPets"></div>
            </div>
            <div class="card section">
              <div style="font-weight:800; margin-bottom:16px;">最近消息</div>
              <div id="recentMessages"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="usersTab" class="tab-panel hidden">
        <div class="card section">
          <div style="font-weight:800; margin-bottom:16px;">用户审核列表</div>
          <div id="usersTable"></div>
          <div id="usersPagination"></div>
        </div>
      </section>

      <section id="petsTab" class="tab-panel hidden">
        <div class="card section">
          <div style="font-weight:800; margin-bottom:16px;">宠物资料</div>
          <div id="petsTable"></div>
          <div id="petsPagination"></div>
        </div>
      </section>

      <section id="marketTab" class="tab-panel hidden">
        <div class="card section">
          <div style="font-weight:800; margin-bottom:16px;">市场数据</div>
          <div id="marketTable"></div>
          <div id="marketPagination"></div>
        </div>
      </section>

      <section id="breedingTab" class="tab-panel hidden">
        <div class="card section">
          <div style="font-weight:800; margin-bottom:16px;">繁育请求</div>
          <div id="breedingTable"></div>
          <div id="breedingPagination"></div>
        </div>
      </section>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const state = {
      token: localStorage.getItem('pupy_admin_token') || '',
      tab: 'overview',
      keyword: '',
      pageSize: 20,
      pageByTab: {
        users: 1,
        pets: 1,
        market: 1,
        breeding: 1,
      },
    };

    const TAB_CONTENT = {
      users: 'usersTable',
      pets: 'petsTable',
      market: 'marketTable',
      breeding: 'breedingTable',
    };

    const $ = (id) => document.getElementById(id);

    function clearNode(node) {
      while (node.firstChild) {
        node.removeChild(node.firstChild);
      }
    }

    function textNode(tag, text, className) {
      const node = document.createElement(tag);
      node.textContent = text;
      if (className) node.className = className;
      return node;
    }

    function div(className, text) {
      const node = document.createElement('div');
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function button(label, options = {}) {
      const node = document.createElement('button');
      node.type = 'button';
      node.textContent = label;
      node.className = options.className || 'ghost';
      if (options.disabled) node.disabled = true;
      if (options.onClick) node.addEventListener('click', options.onClick);
      return node;
    }

    function createPill(label, tone) {
      const node = document.createElement('span');
      node.className = `pill ${tone}`;
      node.textContent = label;
      return node;
    }

    function createEmptyState(message) {
      return div('empty-state', message);
    }

    function createErrorState(message, retryHandler) {
      const wrapper = div('error-state');
      wrapper.appendChild(textNode('p', message));
      if (retryHandler) {
        wrapper.appendChild(button('重试', { className: 'ghost', onClick: retryHandler }));
      }
      return wrapper;
    }

    function setButtonLoading(buttonNode, isLoading, loadingText, defaultText) {
      if (!buttonNode) return;
      buttonNode.disabled = isLoading;
      buttonNode.textContent = isLoading ? loadingText : defaultText;
    }

    function showLoading(containerId, message = '正在加载数据...') {
      const container = $(containerId);
      if (!container) return;
      clearNode(container);
      container.appendChild(div('loading-inline', message));
    }

    function showTableError(containerId, paginationId, message, retryHandler) {
      const container = $(containerId);
      const pagination = $(paginationId);
      if (container) {
        clearNode(container);
        container.appendChild(createErrorState(message, retryHandler));
      }
      if (pagination) {
        clearNode(pagination);
      }
    }

    function toast(message) {
      const node = $('toast');
      node.textContent = message;
      node.classList.add('show');
      window.clearTimeout(window.__toastTimer);
      window.__toastTimer = window.setTimeout(() => node.classList.remove('show'), 2400);
    }

    function setLoggedOutState(message) {
      localStorage.removeItem('pupy_admin_token');
      state.token = '';
      $('app').classList.add('hidden');
      $('loginStatus').textContent = message;
    }

    async function request(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Accept-Language': 'zh-CN',
          ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}),
          ...(options.headers || {}),
        },
      });

      const json = await response.json().catch(() => ({}));
      if (!response.ok) {
        if (response.status === 401 && state.token) {
          setLoggedOutState('登录状态已失效，请重新登录。');
        }
        throw new Error(json.error || '请求失败');
      }
      return json;
    }

    function renderPagination(containerId, pagination, onPageChange) {
      const container = $(containerId);
      clearNode(container);
      if (!pagination) return;

      const wrapper = div('pagination');
      const summary = textNode('div', `第${pagination.page} / ${pagination.total_pages} 页，共${pagination.total} 条`);
      const controls = div('controls');
      controls.appendChild(button('上一页', {
        disabled: pagination.page <= 1,
        onClick: () => onPageChange(pagination.page - 1),
      }));
      controls.appendChild(button('下一页', {
        disabled: pagination.page >= pagination.total_pages,
        onClick: () => onPageChange(pagination.page + 1),
      }));
      wrapper.appendChild(summary);
      wrapper.appendChild(controls);
      container.appendChild(wrapper);
    }

    function renderTable(containerId, columns, rows) {
      const container = $(containerId);
      clearNode(container);

      if (!rows.length) {
        container.appendChild(createEmptyState('暂无数据'));
        return;
      }

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      columns.forEach((column) => headerRow.appendChild(textNode('th', column.label)));
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      rows.forEach((row) => {
        const tr = document.createElement('tr');
        columns.forEach((column) => {
          const td = document.createElement('td');
          const content = column.render(row);
          if (content instanceof Node) {
            td.appendChild(content);
          } else {
            td.textContent = String(content || '');
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      container.appendChild(table);
    }

    function createStackCell(title, subtitle) {
      const wrapper = div('');
      wrapper.appendChild(textNode('strong', title || '未填写')); 
      if (subtitle) {
        wrapper.appendChild(textNode('div', subtitle, 'muted'));
      }
      return wrapper;
    }

    function createStatusCell(label, tone) {
      const wrapper = div('');
      wrapper.appendChild(createPill(label, tone));
      return wrapper;
    }

    function renderList(containerId, rows, formatter, emptyText) {
      const container = $(containerId);
      clearNode(container);
      if (!rows.length) {
        container.appendChild(createEmptyState(emptyText || '暂无数据'));
        return;
      }

      rows.forEach((row, index) => {
        const item = formatter(row);
        if (index < rows.length - 1) {
          item.style.borderBottom = '1px solid var(--line)';
        }
        item.style.padding = '12px 0';
        container.appendChild(item);
      });
    }

    async function validateTokenAndBoot() {
      if (!state.token) return;
      try {
        await request('/api/auth/me');
        loginStatus.textContent = '已识别管理员会话，正在同步数据。';
        await loadCurrentTab();
        $('app').classList.remove('hidden');
      } catch (error) {
        setLoggedOutState(error.message || '历史登录已失效，请重新登录。');
      }
    }

    async function login() {
      const email = $('email').value.trim();
      const password = $('password').value.trim();
      const loginBtn = $('loginBtn');
      if (!email || !password) {
        loginStatus.textContent = '请输入管理员邮箱和登录密码。';
        return;
      }

      setButtonLoading(loginBtn, true, '登录中...', '登录后台');
      loginStatus.textContent = '正在验证管理员身份。';
      try {
        const result = await request('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        state.token = result.data.token;
        localStorage.setItem('pupy_admin_token', state.token);
        await loadCurrentTab();
        $('app').classList.remove('hidden');
        loginStatus.textContent = '登录成功，后台数据已同步。';
        toast('后台登录成功');
      } catch (error) {
        $('app').classList.add('hidden');
        loginStatus.textContent = error.message || '登录失败，请稍后重试。';
      } finally {
        setButtonLoading(loginBtn, false, '登录中...', '登录后台');
      }
    }

    function renderStats(stats) {
      const container = $('stats');
      clearNode(container);
      [
        ['用户', stats.users],
        ['宠物', stats.pets],
        ['消息', stats.messages],
        ['商品', stats.products],
      ].forEach(([label, value]) => {
        const card = div('card stat');
        card.appendChild(textNode('small', String(label)));
        card.appendChild(textNode('strong', String(value)));
        container.appendChild(card);
      });
    }

    async function loadOverview() {
      showLoading('recentUsers');
      showLoading('recentPets');
      showLoading('recentMessages');

      const result = await request('/api/admin/overview');
      renderStats(result.data.stats);

      renderList('recentUsers', result.data.recentUsers || [], (user) => {
        const node = div('');
        const title = textNode('div', user.username || '未命名用户');
        title.style.fontWeight = '700';
        node.appendChild(title);
        node.appendChild(textNode('div', user.email || '未填写邮箱', 'muted')); 
        node.appendChild(textNode('div', `${user.resident_city || '未填写城市'} · ${user.is_verified ? '已审核' : '待审核'}`, 'muted'));
        return node;
      }, '最近还没有新的注册用户。');

      renderList('recentPets', result.data.recentPets || [], (pet) => {
        const node = div('');
        const title = textNode('div', pet.name || '未命名宠物');
        title.style.fontWeight = '700';
        node.appendChild(title);
        node.appendChild(textNode('div', `${pet.type || '未填写类型'} · ${pet.gender || '未填写性别'}`, 'muted'));
        node.appendChild(textNode('div', `主人：${pet.owner?.username || '未知'}`, 'muted'));
        return node;
      }, '最近还没有新的宠物档案。');

      renderList('recentMessages', result.data.recentMessages || [], (message) => {
        const node = div('');
        const title = textNode('div', `${message.sender?.username || '未知'} → ${message.receiver?.username || '未知'}`);
        title.style.fontWeight = '700';
        node.appendChild(title);
        node.appendChild(textNode('div', message.content || '空消息', 'muted')); 
        return node;
      }, '最近还没有新的消息记录。');
    }

    async function loadUsers() {
      showLoading('usersTable');
      const page = state.pageByTab.users;
      const result = await request(`/api/admin/users?page=${page}&limit=${state.pageSize}&keyword=${encodeURIComponent(state.keyword)}`);
      renderTable('usersTable', [
        {
          label: '用户',
          render: (user) => createStackCell(user.username || '未命名用户', user.email || '未填写邮箱'),
        },
        {
          label: '城市 / MBTI',
          render: (user) => createStackCell(user.resident_city || '未填写', user.mbti || '未填写'),
        },
        {
          label: '状态',
          render: (user) => createStatusCell(user.is_verified ? '已审核' : '待审核', user.is_verified ? 'ok' : 'pending'),
        },
        {
          label: '操作',
          render: (user) => {
            const wrapper = div('');
            const label = user.is_verified ? '取消通过' : '审核通过';
            const action = button(label, {
              className: user.is_verified ? 'ghost' : 'primary',
              onClick: async () => {
                setButtonLoading(action, true, '处理中...', label);
                try {
                  await request(`/api/admin/users/${user.id}/verification`, {
                    method: 'PATCH',
                    body: JSON.stringify({ is_verified: !user.is_verified }),
                  });
                  toast(!user.is_verified ? '审核状态已更新为通过' : '审核状态已取消');
                  await loadUsers();
                } catch (error) {
                  toast(error.message || '审核更新失败');
                } finally {
                  setButtonLoading(action, false, '处理中...', label);
                }
              },
            });
            wrapper.appendChild(action);
            return wrapper;
          },
        },
      ], result.data || []);
      renderPagination('usersPagination', result.pagination, (nextPage) => {
        state.pageByTab.users = nextPage;
        void safeLoadSection('users');
      });
    }

    async function loadPets() {
      showLoading('petsTable');
      const page = state.pageByTab.pets;
      const result = await request(`/api/admin/pets?page=${page}&limit=${state.pageSize}`);
      renderTable('petsTable', [
        { label: '宠物', render: (pet) => createStackCell(pet.name || '未命名宠物', pet.type || '未填写类型') },
        { label: '主人', render: (pet) => createStackCell(pet.owner?.username || '未知', pet.owner?.email || '') },
        { label: '健康', render: (pet) => createStackCell(pet.health_status || '未填写', `疫苗：${pet.vaccinated ? '已接种' : '未接种'}`) },
        { label: '分身', render: (pet) => createStatusCell(pet.is_digital_twin ? '已生成' : '未生成', pet.is_digital_twin ? 'ok' : 'pending') },
      ], result.data || []);
      renderPagination('petsPagination', result.pagination, (nextPage) => {
        state.pageByTab.pets = nextPage;
        void safeLoadSection('pets');
      });
    }

    async function loadMarket() {
      showLoading('marketTable');
      const page = state.pageByTab.market;
      const result = await request(`/api/admin/market?page=${page}&limit=${state.pageSize}`);
      renderTable('marketTable', [
        { label: '标题', render: (item) => createStackCell(item.title || '未命名商品', item.category || item.type || '未分类') },
        { label: '卖家', render: (item) => createStackCell(item.seller?.username || '未知', item.seller?.email || '') },
        { label: '宠物', render: (item) => createStackCell(item.pet?.name || '未关联', item.pet?.type || '') },
        { label: '价格 / 状态', render: (item) => createStackCell(item.price ? `¥${item.price}` : '待定', item.status || 'active') },
      ], result.data || []);
      renderPagination('marketPagination', result.pagination, (nextPage) => {
        state.pageByTab.market = nextPage;
        void safeLoadSection('market');
      });
    }

    async function loadBreeding() {
      showLoading('breedingTable');
      const page = state.pageByTab.breeding;
      const result = await request(`/api/admin/breeding?page=${page}&limit=${state.pageSize}`);
      renderTable('breedingTable', [
        { label: '发起方', render: (item) => createStackCell(item.sender?.username || '未知', item.sender_pet?.name || '未关联宠物') },
        { label: '接收方', render: (item) => createStackCell(item.receiver?.username || '未知', item.receiver_pet?.name || '未关联宠物') },
        { label: '状态', render: (item) => createStatusCell(item.status || 'pending', item.status === 'accepted' || item.status === 'completed' ? 'ok' : 'pending') },
        { label: '备注', render: (item) => textNode('span', item.notes || '无备注') },
      ], result.data || []);
      renderPagination('breedingPagination', result.pagination, (nextPage) => {
        state.pageByTab.breeding = nextPage;
        void safeLoadSection('breeding');
      });
    }

    async function loadCurrentTab() {
      if (state.tab === 'overview') return loadOverview();
      if (state.tab === 'users') return loadUsers();
      if (state.tab === 'pets') return loadPets();
      if (state.tab === 'market') return loadMarket();
      return loadBreeding();
    }

    async function safeLoadSection(tabName) {
      try {
        if (tabName) state.tab = tabName;
        await loadCurrentTab();
      } catch (error) {
        if (state.tab === 'overview') {
          ['recentUsers', 'recentPets', 'recentMessages'].forEach((containerId) => {
            const container = $(containerId);
            clearNode(container);
            container.appendChild(createErrorState(error.message || '后台数据加载失败。', () => {
              void safeLoadSection('overview');
            }));
          });
          return;
        }

        const containerId = TAB_CONTENT[state.tab];
        const paginationId = `${state.tab}Pagination`;
        showTableError(containerId, paginationId, error.message || '当前列表加载失败。', () => {
          void safeLoadSection(state.tab);
        });
      }
    }

    document.querySelectorAll('.tab').forEach((buttonNode) => {
      buttonNode.addEventListener('click', async () => {
        document.querySelectorAll('.tab').forEach((node) => node.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach((node) => node.classList.add('hidden'));
        buttonNode.classList.add('active');
        state.tab = buttonNode.dataset.tab;
        $(`${state.tab}Tab`).classList.remove('hidden');
        await safeLoadSection(state.tab);
      });
    });

    $('loginBtn').addEventListener('click', () => {
      void login();
    });

    ['email', 'password'].forEach((id) => {
      $(id).addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          void login();
        }
      });
    });

    $('refreshBtn').addEventListener('click', async () => {
      setButtonLoading(refreshBtn, true, '刷新中...', '刷新数据');
      try {
        await safeLoadSection(state.tab);
        toast('后台数据已刷新');
      } catch (error) {
        toast(error.message || '刷新失败');
      } finally {
        setButtonLoading(refreshBtn, false, '刷新中...', '刷新数据');
      }
    });

    $('keyword').addEventListener('input', async (event) => {
      state.keyword = event.target.value.trim();
      state.pageByTab.users = 1;
      if (state.tab === 'users') {
        await safeLoadSection('users');
      }
    });

    $('logoutBtn').addEventListener('click', () => {
      setLoggedOutState('已退出后台。');
      toast('已退出');
    });

    void validateTokenAndBoot();
  </script>
</body>
</html>
